{% extends "pattern/register-PageType.html" %}

{% block title %}Регистрация{% endblock %}

{% block import %}
<script src="{{ url_for('static', filename='js/register.js') }}"></script>
{% endblock %}



{% block content %}

<div class="title">Регистрация</div>
    <div class="description">Введите имя, фамилию, электронную почту(логин) и два раза напишите пароль.</div>

    <div class="error"></div>
                
    <div id="inputs">
        <input type="text" class="input-ferstname" placeholder="Введите имя">
        <input type="text" class="input-lastname" placeholder="Введите фамилию">
        <input type="text" class="input-login" placeholder="Введите адрес электронной почты">

        <input type="password" class="input-password" placeholder="Введите пароль">
        <input type="password" class="input-db_password" placeholder="Повторите пароль">
        <button onclick="AddMainData();">Продолжить</button>
    </div>

{% endblock %}
